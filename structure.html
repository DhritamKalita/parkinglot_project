<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>
<body>
  <div class="container">
    <div class="searchbar">
      <div class="search">
        <i class="fa-solid fa-magnifying-glass search-icon"></i>
        <p1>Where are you parking?</p1>
      </div>
    </div>
    <div class="recent">
      <div class="recentsearch">
        <div class="r1">
          <i class="fa-solid fa-clock clock-rotate-left"></i>
          <p2>Narengi</p2>
        </div>
        <div class="r1">
          <i class="fa-solid fa-clock clock-rotate-left"></i>
          <p2>ADTU</p2>
        </div>
        <div class="r1">
          <i class="fa-solid fa-clock clock-rotate-left"></i>
          <p2>Noonmati</p2>
        </div>
      </div>
    </div>
    <div class="fair">
      <div class="fair-heading">
        <pfair>Choose your Parking</pfair>
      </div>
      <div class="vehicle">
        <div class="car-card">
          <div class="logo">
            <i class="fa-solid fa-car car"></i>
          </div>
          <div class="name">
            <p3>Car Parking</p3>
          </div>
          <div class="chargeperhour">
            <p3>Rs 20-60/hour</p3>
          </div>
        </div>
        <div class="bike-card">
          <div class="logo">
            <i class="fa-solid fa-motorcycle motorcycle"></i>
          </div>
          <div class="name">
            <p3>Bike Parking</p3>
          </div>
          <div class="chargeperhour">
            <p3>Rs 10-30/hour</p3>
          </div>
        </div>
        <div class="cycle-card">
          <div class="logo">
            <i class="fa-solid fa-bicycle bicycle"></i>
          </div>
          <div class="name">
            <p3>Cycle Parking</p3>
          </div>
          <div class="chargeperhour">
            <p3>Rs 5-20/hour</p3>
          </div>
        </div>
      </div>
    </div>
    <div class="bottom">
      <div class="options">
        <div class="home">
          <div class="icon">
            <i class="fa-solid fa-house house"></i>
          </div>
          <div class="icon-name">
            <p5>Home</p5>
          </div>
        </div>
        <div class="services">
          <div class="icon">
            <i class="fa-solid fa-grip grip"></i>
          </div>
          <div class="icon-name">
            <p5>Services</p5>
          </div>
        </div>
        <div class="activity">
          <div class="icon">
            <i class="fa-solid fa-receipt receipt"></i>
          </div>
          <div class="icon-name">
            <p5>Activity</p5>
          </div>
        </div>
        <div class="account">
          <div class="icon">
            <i class="fa-solid fa-user user"></i>
          </div>
          <div class="icon-name">
            <p5>Profile</p5>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
